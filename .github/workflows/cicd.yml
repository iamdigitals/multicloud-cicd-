name: Multi-Cloud CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_NAME: cicd-demo
  NODE_VERSION: "20"
  AWS_REGION: us-east-1
  GCP_REGION: us-central1
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  ECR_REPOSITORY: cicd-demo-app

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Test
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

  # ─────────────────────────────────────────
  # Stage 2: Security scans — Trivy (filesystem) + tfsec (Terraform)
  # ─────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: tfsec Terraform scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform

  # ─────────────────────────────────────────
  # Stage 3: Build & push image to ECR + Artifact Registry
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: docker build -t local/${{ env.ECR_REPOSITORY }}:${{ github.sha }} ./app

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag local/${{ env.ECR_REPOSITORY }}:${{ github.sha }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Push to GCP Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.PROJECT_NAME }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          docker tag local/${{ env.ECR_REPOSITORY }}:${{ github.sha }} $IMAGE
          docker push $IMAGE

  # ─────────────────────────────────────────
  # Stage 4: Deploy to AWS ECS Fargate (rolling, health-gated)
  # ─────────────────────────────────────────
  deploy-aws:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws-production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Record current task definition (for rollback)
        id: current-task-def
        run: |
          ARN=$(aws ecs describe-services \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --services ${{ env.PROJECT_NAME }}-service \
            --query 'services[0].taskDefinition' --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-app \
            --query 'taskDefinition' > task-def.json

      - name: Render new image into task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.PROJECT_NAME }}-app
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy — waits for the health-check gate to pass
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: ${{ env.PROJECT_NAME }}-cluster
          service: ${{ env.PROJECT_NAME }}-service
          wait-for-service-stability: true

      # If the new tasks never pass the ALB health check, the step above
      # times out and fails — this step then rolls back automatically.
      - name: Roll back on failed health check
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "Deployment failed to stabilize — rolling back to ${{ steps.current-task-def.outputs.arn }}"
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --service ${{ env.PROJECT_NAME }}-service \
            --task-definition ${{ steps.current-task-def.outputs.arn }}

  # ─────────────────────────────────────────
  # Stage 5: Deploy to GCP Cloud Run (canary 10% → 100%)
  # ─────────────────────────────────────────
  deploy-gcp:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: gcp-production
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy new revision with no traffic
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.PROJECT_NAME }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          gcloud run deploy ${{ env.PROJECT_NAME }}-app \
            --image="$IMAGE" \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --no-traffic \
            --tag=canary \
            --set-env-vars="CLOUD_PROVIDER=GCP,ENV=production,APP_VERSION=${{ github.sha }}" \
            --memory=256Mi --cpu=1 --min-instances=0 --max-instances=3

      - name: Send 10% of traffic to the canary
        run: |
          gcloud run services update-traffic ${{ env.PROJECT_NAME }}-app \
            --region=${{ env.GCP_REGION }} \
            --to-tags=canary=10

      - name: Health check the canary
        id: canary-check
        run: |
          URL=$(gcloud run services describe ${{ env.PROJECT_NAME }}-app \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.traffic[0].url)')
          sleep 20
          curl -f "$URL/health"

      - name: Promote canary to 100% traffic
        if: success()
        run: |
          gcloud run services update-traffic ${{ env.PROJECT_NAME }}-app \
            --region=${{ env.GCP_REGION }} \
            --to-latest

      - name: Roll back — keep traffic on the stable revision
        if: failure() && steps.canary-check.outcome == 'failure'
        run: |
          echo "Canary failed its health check — leaving traffic on the previous stable revision"
          gcloud run services update-traffic ${{ env.PROJECT_NAME }}-app \
            --region=${{ env.GCP_REGION }} \
            --to-tags=canary=0

  # ─────────────────────────────────────────
  # Stage 6: Notify
  # ─────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-aws, deploy-gcp]
    if: always()
    steps:
      - name: Report result
        run: |
          if [ "${{ needs.deploy-aws.result }}" = "success" ] && [ "${{ needs.deploy-gcp.result }}" = "success" ]; then
            echo "Deployment succeeded on both clouds — version ${{ github.sha }}"
          else
            echo "Deployment had failures — check the deploy-aws and deploy-gcp job logs"
          fi
